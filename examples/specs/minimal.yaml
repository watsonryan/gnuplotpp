figure:
  title: "CLI YAML Demo"
  preset: IEEE_SingleColumn
  profile: Tufte_Minimal
  formats: [pdf, svg, png]
axes:
  - title: "Configured from YAML"
    xlabel: "t [s]"
    ylabel: "x(t)"
    grid: true
    legend: true
    typography:
      title_font_pt: 12
      title_bold: true
    frame:
      border_mask: 3
      ticks_out: true
    series:
      - type: line
        label: "signal"
        line_width_pt: 1.8
        csv:
          path: "minimal.csv"
          x: "t"
          y: "signal"
