figure:
  title: "CLI YAML Demo"
  preset: IEEE_SingleColumn
  profile: Tufte_Minimal
  formats: [pdf, svg, png]
axes:
  - title: "Configured from YAML"
    xlabel: "t [s]"
    ylabel: "x(t)"
    grid: true
    legend: true
    frame:
      border_mask: 3
      ticks_out: true
    series:
      - type: line
        label: "signal\\_a"
        line_width_pt: 2.8
        csv:
          path: "minimal.csv"
          x: "t"
          y: "signal_a"
      - type: line
        label: "signal\\_c"
        line_width_pt: 2.8
        csv:
          path: "minimal.csv"
          x: "t"
          y: "signal_c"
      - type: line
        label: "signal\\_e"
        line_width_pt: 2.8
        csv:
          path: "minimal.csv"
          x: "t"
          y: "signal_e"
